
name: Weekly Image URL Validator

on:
  schedule:
    - cron: "0 0 * * 0"  # Every Sunday at midnight
  
  workflow_dispatch:
    inputs:
      manga_slug:
        description: "Validate a specific manga only (leave empty for all)"
        required: false
        type: string
      fix_urls:
        description: "Auto-fix broken URLs (try alternate extensions)"
        required: false
        type: boolean
        default: true

jobs:
  validate-images:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hour cap

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Run image validator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MANGA_SLUG: ${{ github.event.inputs.manga_slug || '' }}
          FIX_URLS: ${{ github.event.inputs.fix_urls || 'true' }}
        run: |
          python validate_images.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_number }}
          path: |
            validation_report_*.txt
          retention-days: 30
