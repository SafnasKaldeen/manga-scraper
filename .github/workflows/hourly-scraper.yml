name: Hourly News Scraper (Anime & Manga)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install dependencies
        run: |
          pip cache purge
          pip install --no-cache-dir --force-reinstall \
            "selenium==4.18.1" \
            requests \
            beautifulsoup4 \
            "supabase>=2.0"

      - name: Verify selenium
        run: |
          pip show selenium
          python -c "from selenium.webdriver.common.by import By; print('Selenium OK')"

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "▶ Starting anime & manga news scraper..."
          python scraper.py
          echo "✓ Scraper finished"

      - name: Upload results as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-results-${{ github.run_number }}
          path: |
            results_*.json
          retention-days: 3

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_number }}
          path: |
            *.log
            *.txt
          retention-days: 7
